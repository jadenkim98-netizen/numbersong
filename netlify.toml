# Netlify config — NO build step. dist/ is pre-built locally (run ./build.sh)
# and committed, so Netlify just uploads it. `command = "true"` is an instant
# no-op that skips the CI build to conserve build minutes. To change the app:
# edit src/, run ./build.sh, commit the updated dist/, push.
[build]
  command = "true"
  publish = "dist"

# Never let the browser/PWA serve a stale app: always revalidate the HTML so a
# new deploy shows up on next load (phones cache index.html aggressively).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

.retro{
  --pf:'NmbrsngPixel','Courier New',monospace;   /* chrome / titles / HUD  */
  --sans:'Archivo','Helvetica Neue',Arial,sans-serif;
  --black:'Archivo Black','Arial Black',sans-serif; /* the numbers          */
  /* palette tokens (fall back to WeJam defaults if the app hasn't set them) */
  --bg:#383D3B; --card:#424845; --line:#565D59; --text:#EDF2EE;
  --green:#6ABF5E; --blue:#7CADD1; --teal:#57C6C4; --wrong:#E07856; --gold:#D9B45B;
  --ink:#20302E;                                   /* hard shadow / pixel outline */
  --hl:rgba(237,242,238,.14); --sh:rgba(0,0,0,.36);/* bevel light / dark        */
  /* cut-corner "pixel panel" silhouette, reused via clip-path:var(--notch) */
  --notch:polygon(0 4px,4px 4px,4px 0,calc(100% - 4px) 0,calc(100% - 4px) 4px,
    100% 4px,100% calc(100% - 4px),calc(100% - 4px) calc(100% - 4px),
    calc(100% - 4px) 100%,4px 100%,4px calc(100% - 4px),0 calc(100% - 4px));
}

/* pixel font on all "chrome" text; NUMBERS explicitly stay Archivo below */
.retro .screen-title,.retro .tab,.retro .primary,.retro .ghost,.retro .back,
.retro .chip,.retro .hint,.retro .foot,.retro .seg,.retro .menu-item,
.retro .encounter-title,.retro .encounter-sub,.retro .victory,.retro .hp-label,
.retro .level .name,.retro .kicker{
  font-family:var(--pf); letter-spacing:1px; text-transform:uppercase;
  -webkit-font-smoothing:none; font-smooth:never;
}

/* ---- app shell: soft CRT scanlines + vignette (kept very subtle) ----------
   NB: assumes .app is already a positioning context (the app root usually is).
   We intentionally do NOT set `position` here so we never fight the app's own
   layout. If your .app is static, add `position:relative` to it yourself. */
.retro.app,.retro .app{
  background:var(--bg); color:var(--text); image-rendering:pixelated;
}
.retro .app::after,.retro.app::after{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:60;
  background:
    repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px),
    radial-gradient(120% 90% at 50% 40%,transparent 60%,rgba(0,0,0,.32) 100%);
  mix-blend-mode:multiply; opacity:.5;
}

/* ---- screen title / back / kicker ---------------------------------------- */
.retro .screen-title{
  color:var(--teal); font-size:20px; line-height:1.1;
  text-shadow:2px 2px 0 var(--ink); margin:0;
}
.retro .kicker{ color:var(--text); opacity:.5; font-size:9px; }
.retro .back{
  display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  background:var(--card); color:var(--text); font-size:10px; padding:8px 11px;
  border:0; clip-path:var(--notch);
  box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh);
}
.retro .back:active{ box-shadow:inset -2px -2px 0 var(--hl),inset 2px 2px 0 var(--sh); }

/* ---- cards / panels: double pixel frame ---------------------------------- */
.retro .card,.retro .panel,.retro .stack,.retro .numpad,.retro .foot{
  clip-path:var(--notch); background:var(--card); border:0;
  box-shadow:inset 0 0 0 2px var(--line),inset 0 0 0 4px rgba(0,0,0,.22),
             inset 0 3px 0 2px rgba(237,242,238,.05);
}
.retro .panel,.retro .stack,.retro .numpad{ background:#3c423f; }
.retro .foot{
  background:var(--card); color:var(--text); font-size:9px; opacity:.9;
  box-shadow:inset 0 2px 0 0 var(--line); clip-path:none; padding:10px 14px;
}

/* ---- level list rows ----------------------------------------------------- */
.retro .level{
  display:flex; align-items:center; gap:12px; cursor:pointer; border:0;
  background:var(--card); color:var(--text); padding:13px 14px;
  clip-path:var(--notch);
  box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh);
}
.retro .level .name{ font-size:12px; }
.retro .level .idx{
  font-family:var(--black); font-size:16px; color:var(--teal);
  width:26px; text-align:center; flex:0 0 auto;
}
.retro .level .stars{ margin-left:auto; color:var(--gold); font-family:var(--pf); font-size:13px; letter-spacing:2px; }
.retro .level:active{ box-shadow:inset -2px -2px 0 var(--hl),inset 2px 2px 0 var(--sh); }
.retro .level.current{ box-shadow:inset 0 0 0 2px var(--green),inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh); }
.retro .level.locked{ color:var(--line); cursor:not-allowed; opacity:.75; }
.retro .level.locked .idx{ color:var(--line); }
.retro .level.gold{ box-shadow:inset 0 0 0 2px var(--gold),inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh); }
.retro .level.gold .idx{ color:var(--gold); }

/* ---- buttons: primary / ghost / tab / segment ---------------------------- */
.retro .primary,.retro .ghost,.retro .tab,.retro .seg{
  cursor:pointer; border:0; clip-path:var(--notch); font-size:12px; padding:14px 16px;
  box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh);
}
.retro .primary{ background:var(--green); color:#20301d; text-shadow:1px 1px 0 rgba(255,255,255,.25); }
.retro .ghost{ background:transparent; color:var(--teal);
  box-shadow:inset 0 0 0 2px var(--teal),inset 2px 2px 0 rgba(87,198,196,.25); }
.retro .tab{ background:var(--card); color:var(--text); font-size:10px; padding:10px 12px; }
.retro .tab.on{ background:var(--teal); color:var(--ink); }
.retro .seg{ background:var(--card); color:var(--text); font-size:10px; padding:9px 10px; }
.retro .seg.on{ background:var(--blue); color:var(--ink); }
.retro .primary:active,.retro .ghost:active,.retro .tab:active,.retro .seg:active{
  box-shadow:inset -2px -2px 0 var(--hl),inset 2px 2px 0 var(--sh); transform:translateY(1px); }

/* ---- chips (HUD status tags) --------------------------------------------- */
.retro .chip{
  display:inline-flex; align-items:center; gap:5px; font-size:9px;
  background:var(--card); color:var(--text); padding:6px 9px; border:0;
  clip-path:var(--notch);
  box-shadow:inset 1px 1px 0 var(--hl),inset -1px -1px 0 var(--sh); }
.retro .chip .g{ color:var(--gold); } .retro .chip .t{ color:var(--teal); }

/* ---- hint / caption ------------------------------------------------------ */
.retro .hint{ color:var(--text); opacity:.55; font-size:9px; line-height:1.7; }

/* ---- the NUMPAD & numbers (Archivo — readability protected) --------------- */
.retro .key-row{ display:flex; gap:8px; }
.retro .num{
  font-family:var(--black); text-transform:none; letter-spacing:0;
  font-size:26px; color:var(--text); cursor:pointer; border:0;
  background:var(--card); clip-path:var(--notch); padding:14px 0; flex:1 1 0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh); }
.retro .num.tonic{ color:var(--teal); }
.retro .num.chord{ color:var(--blue); }
.retro .num:active{ box-shadow:inset -2px -2px 0 var(--hl),inset 2px 2px 0 var(--sh); }
.retro .num.correct{ background:var(--green); color:var(--ink); }
.retro .num.wrong{ background:var(--wrong); color:var(--ink); animation:rt-shake .28s steps(3); }

/* ---- stack notation frame (numbers inside remain Archivo) ----------------- */
.retro .stack{ padding:12px; }
.retro .stack .num{ box-shadow:none; background:transparent; padding:2px 0; font-size:18px; }

/* =====================  RETRO GAME COMPONENTS  ============================= */
/* streak counter pill (encounter / trial gauge / victory live in the Phase-2 block at the end) */
.retro .streak{ font-family:var(--pf); color:var(--gold); font-size:11px; letter-spacing:1px; }
.retro .burst{ animation:rt-flash 1.2s ease-out; }

/* PRESS START prompt / blinking caret ------------------------------------- */
.retro .blink{ animation:rt-blink 1s steps(1) infinite; }

/* ---- keyframes ----------------------------------------------------------- */
@keyframes rt-blink{ 50%{ opacity:0; } }
@keyframes rt-bob{ 50%{ transform:translateY(-3px); } }
@keyframes rt-pop{ from{ transform:scale(.86); opacity:0; } }
@keyframes rt-shake{ 33%{ transform:translateX(-3px);} 66%{ transform:translateX(3px);} }
@keyframes rt-flash{ 0%{ filter:brightness(2.2);} 100%{ filter:brightness(1);} }
@media (prefers-reduced-motion:reduce){ .retro *{ animation:none!important; } }

/* ============================================================================
   APP PATCHES — map the kit onto Numbersong's real class names + boot/menu.
   ============================================================================ */
.retro .app{ position:relative; }

/* numpad: keep our column layout + solfège; readability protected */
.retro .num{ flex:initial; display:flex; flex-direction:column; gap:1px; aspect-ratio:auto; padding:12px 0; }
.retro .num .num-sol{ font-family:var(--sans); font-size:.6rem; letter-spacing:normal; text-transform:lowercase; color:var(--text-soft); }
.retro .num.picked{ background:var(--blue); color:var(--ink); }
.retro .num.dim{ opacity:.28; }

/* level rows (our names: level-num / level-name / level-desc / level-pct) */
.retro .level-num{ font-family:var(--black); font-size:16px; color:var(--teal); }
.retro .level-name{ font-family:var(--pf); font-size:12px; letter-spacing:1px; text-transform:uppercase; }
.retro .level-desc,.retro .level-tags,.retro .tag,.retro .card-desc,.retro .card-progress,.retro .set-desc{ font-family:var(--sans); text-transform:none; letter-spacing:normal; }
.retro .level-state,.retro .level-pct{ font-family:var(--pf); }
.retro .card-title{ font-family:var(--pf); text-transform:uppercase; letter-spacing:1px; font-size:14px; }
.retro .card.start .card-title,.retro .card.adventure .card-title,.retro .card.quiet .card-title{ color:var(--teal); }

/* segmented controls: our .seg is a CONTAINER of buttons */
.retro .seg{ background:transparent; box-shadow:none; clip-path:none; padding:0; display:flex; gap:6px; }
.retro .seg button{ font-family:var(--pf); font-size:10px; text-transform:uppercase; letter-spacing:1px; border:0; background:var(--card); color:var(--text); clip-path:var(--notch); padding:10px 8px; box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh); }
.retro .seg button.on{ background:var(--blue); color:var(--ink); }
.retro .key-label{ font-family:var(--pf); font-size:9px; text-transform:uppercase; color:var(--text); }
.retro select{ font-family:var(--sans); background:var(--card); color:var(--text); border:0; box-shadow:inset 1px 1px 0 var(--hl),inset -1px -1px 0 var(--sh); clip-path:var(--notch); }

/* ---- boot / title screen ---- */
.boot-screen,.menu-screen{ align-items:center; justify-content:center; text-align:center; gap:26px; }
.boot-title,.menu-logo{ font-family:'Archivo Black',sans-serif; font-size:2.6rem; line-height:1; margin:0; }
.retro .boot-title,.retro .menu-logo{ font-family:var(--pf); letter-spacing:2px; text-shadow:3px 3px 0 var(--ink); }
.boot-title .w1,.menu-logo .w1{ color:var(--green); } .boot-title .w2,.menu-logo .w2{ color:var(--blue); }
.boot-star{ height:24px; margin-left:8px; vertical-align:middle; image-rendering:pixelated; }
.boot-start{ color:var(--teal); font-size:1rem; letter-spacing:2px; }

/* ---- main menu ---- */
.menu-list{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
.menu-item{ width:100%; text-align:left; display:flex; align-items:center; gap:12px; padding:16px 18px; font-size:1.05rem; background:var(--card); color:var(--text); border:1.5px solid var(--line); border-radius:12px; cursor:pointer; }
.menu-item:hover{ border-color:var(--teal); }
.retro .menu-item{ font-family:var(--pf); text-transform:uppercase; letter-spacing:1px; font-size:13px; border:0; clip-path:var(--notch); box-shadow:inset 2px 2px 0 var(--hl),inset -2px -2px 0 var(--sh); }
.retro .menu-item:active{ box-shadow:inset -2px -2px 0 var(--hl),inset 2px 2px 0 var(--sh); transform:translateY(1px); }
.menu-item .mi-icon{ font-size:1.3rem; flex:0 0 auto; }

/* ---- readability rescue: the session prompt + chord feedback use .hint,
   which the kit rendered as 9px UPPERCASE pixel — unreadable for sentences.
   Keep instructional text clean sans; game flavor stays in titles/buttons. */
.retro .hint{ font-family:var(--sans); text-transform:none; letter-spacing:normal;
  font-size:.98rem; line-height:1.5; opacity:.92; }
.retro .hint strong{ color:var(--teal); font-family:var(--sans); }
.retro .hint em,.retro .hint .numlabel{ font-style:normal; color:var(--gold); font-family:var(--sans); }
/* the retro Repeat/Voice buttons are chunkier than boring's — let the feedback
   line drop to its own full-width row instead of getting squeezed to a sliver */
.retro .quiz-bar{ flex-wrap:wrap; align-items:center; }
.retro .quiz-bar .hint{ flex:1 1 100%; min-width:0; margin:4px 2px 0; text-align:left; }

/* selected segments in Settings: the app paints .on text teal, which on our blue
   fill is teal-on-blue (unreadable). Force dark ink for contrast. */
.retro .set-block .seg button.on{ background:var(--blue); color:var(--ink); border-color:var(--blue); }

/* keep the big pixel title from clipping the right edge on narrow phones */
.retro .boot-title,.retro .menu-logo{ font-size:clamp(1.7rem,8.4vw,2.6rem); }

/* stage "what you'll learn" preview card — pixel frame, but body text stays sans */
.retro .stage-intro{ clip-path:var(--notch); border:0; border-left:0;
  box-shadow:inset 0 0 0 2px var(--teal),inset 0 0 0 4px rgba(0,0,0,.25); }
.retro .stage-goal{ font-family:var(--sans); }
.retro .stage-meta{ font-family:var(--pf); letter-spacing:1px; }

/* =====================  PHASE 2 — ENCOUNTERS (The Eight Keepers)  ========== */

/* ---- 1) region encounter card (levels screen, adventure entry) ----------
   Replaces the plain .stage-intro when .retro + fromAdventure. Titles are
   pixel; the keeper's speech and the teaching text stay --sans (sacred). */
.retro .encounter{
  clip-path:var(--notch); background:var(--card); padding:0; text-align:left;
  box-shadow:inset 0 0 0 2px var(--em,var(--teal)),inset 0 0 0 4px rgba(0,0,0,.3);
  margin:0 0 14px; animation:rt-pop .32s cubic-bezier(.2,1.3,.4,1);
}
.retro .encounter.mood-major { --em:var(--green); }
.retro .encounter.mood-minor { --em:var(--blue);  }
.retro .encounter.mood-mystic{ --em:var(--teal);  }
.retro .encounter.mood-cave  { --em:#9b8ec4;      }
.retro .encounter.mood-coast { --em:var(--blue);  }
.retro .encounter.mood-bridge{ --em:var(--gold);  }
.retro .encounter.mood-forge { --em:var(--wrong); }

.retro .enc-head{
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:rgba(0,0,0,.22); box-shadow:inset 0 -2px 0 0 var(--line);
}
.retro .enc-emblem{
  flex:0 0 auto; width:44px; height:44px; display:flex; align-items:center;
  justify-content:center; font-size:24px; clip-path:var(--notch);
  background:var(--bg); box-shadow:inset 0 0 0 2px var(--em,var(--teal));
  image-rendering:pixelated;
}
.retro .enc-emblem img{ width:32px; height:32px; image-rendering:pixelated; }
.retro .enc-titles{ flex:1 1 auto; min-width:0; }
.retro .enc-titles .kicker{ display:block; font-family:var(--pf); text-transform:uppercase; letter-spacing:1px; color:var(--text); opacity:.5; font-size:8px; margin-bottom:3px; }
.retro .encounter-title{
  font-family:var(--pf); text-transform:uppercase; letter-spacing:1px;
  color:var(--em,var(--teal)); font-size:15px; line-height:1.2; margin:0;
  text-shadow:2px 2px 0 var(--ink);
}
.retro .encounter-sub{ display:block; font-family:var(--pf); text-transform:uppercase; letter-spacing:1px; color:var(--text); opacity:.65; font-size:9px; margin:4px 0 0; }
.retro .enc-frag{
  flex:0 0 auto; font-family:var(--pf); font-size:9px; letter-spacing:1px;
  text-transform:uppercase; color:var(--gold); text-align:right; line-height:1.6;
}
.retro .enc-frag .gem{ display:block; font-size:14px; animation:rt-bob 1.4s ease-in-out infinite; }

.retro .keeper-line{
  margin:0; padding:12px 14px 0; font-family:var(--sans); font-size:.95rem;
  line-height:1.5; color:var(--text); text-transform:none; letter-spacing:normal;
}
.retro .keeper-name{
  display:block; font-family:var(--pf); font-size:10px; letter-spacing:1px;
  text-transform:uppercase; color:var(--em,var(--teal)); margin-bottom:5px;
}
.retro .keeper-line q{ quotes:"\201C" "\201D"; font-style:italic; opacity:.95; }

.retro .encounter .stage-goal{
  margin:0; padding:10px 14px 0; font-family:var(--sans); font-size:.92rem;
  line-height:1.5; text-transform:none; letter-spacing:normal;
}
.retro .encounter .stage-meta{
  display:block; padding:10px 14px 13px; font-family:var(--pf); font-size:8px;
  letter-spacing:1px; text-transform:uppercase; color:var(--text); opacity:.55;
}

/* ---- 2) TRIAL gauge (session screen) ------------------------------------- */
.retro .progressbar{ display:none; }
.retro .hpbar{ display:flex; align-items:center; gap:8px; margin:2px 0; }
.retro .hp-label{
  font-family:var(--pf); font-size:9px; letter-spacing:1px;
  text-transform:uppercase; color:var(--text); opacity:.7; flex:0 0 auto;
}
.retro .trial-cells{
  flex:1 1 auto; display:flex; gap:3px; height:14px; padding:3px;
  background:var(--bg); clip-path:var(--notch);
  box-shadow:inset 0 0 0 2px var(--line);
}
.retro .trial-cells .cell{ flex:1 1 0; background:rgba(237,242,238,.07); position:relative; }
.retro .trial-cells .cell.hit{
  background:var(--green);
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.25);
}
.retro .trial-cells .cell.miss{
  background:var(--wrong);
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.2);
}
.retro .trial-cells .cell.mark::after{
  content:""; position:absolute; top:-5px; bottom:-5px; right:-2.5px; width:2px;
  background:var(--gold); box-shadow:0 0 4px var(--gold);
}
.retro .trial-cells .cell.hot{ animation:rt-hot .7s steps(2) infinite; }
@keyframes rt-hot{ 50%{ filter:brightness(1.5); } }
.retro .combo{
  font-family:var(--pf); font-size:10px; letter-spacing:1px; color:var(--gold);
  flex:0 0 auto; animation:rt-pop .25s cubic-bezier(.2,1.4,.4,1);
}
.retro .session-score{ font-family:var(--pf); font-size:11px; letter-spacing:1px; }
.retro .session-score .streak{ margin-right:8px; }

/* ---- 3) victory + fragment flourish (results screen) --------------------- */
.retro .victory{
  clip-path:var(--notch); background:var(--card); width:100%;
  padding:18px 16px 16px; text-align:center; margin:0 0 16px;
  box-shadow:inset 0 0 0 2px var(--gold),inset 0 0 0 4px rgba(0,0,0,.3);
  animation:rt-pop .4s cubic-bezier(.2,1.4,.4,1);
}
.retro .victory-title{
  font-family:var(--pf); color:var(--gold); font-size:17px; margin:0;
  letter-spacing:1px; text-transform:uppercase; text-shadow:2px 2px 0 var(--ink);
  animation:rt-flash 1.2s ease-out;
}
.retro .victory-quote{
  display:block; margin:10px 0 0; font-family:var(--sans); font-size:.95rem;
  line-height:1.5; color:var(--text); text-transform:none; letter-spacing:normal;
}
.retro .victory .frag-chip{
  display:inline-flex; align-items:center; gap:8px; margin-top:14px;
  padding:8px 14px; clip-path:var(--notch); background:var(--bg);
  box-shadow:inset 0 0 0 2px var(--teal);
  font-family:var(--pf); font-size:10px; letter-spacing:1px;
  text-transform:uppercase; color:var(--teal);
}
.retro .victory .frag-chip .gem{ font-size:16px; color:var(--gold); animation:rt-bob .9s ease-in-out infinite; }
.retro .victory .forge-count{
  display:block; margin-top:10px; font-family:var(--pf); font-size:9px;
  letter-spacing:1px; text-transform:uppercase; color:var(--text); opacity:.6;
}
.retro .adv-sword-mini.burst{ animation:rt-flash 1.4s ease-out; }

/* ---- encounter as a MAP MODAL (tap a region → pops over the map) --------- */
.retro .encounter-modal{
  position:fixed; inset:0; z-index:50; display:flex; align-items:center;
  justify-content:center; padding:20px; background:rgba(0,0,0,.6);
  animation:rt-fadein .2s ease-out;
}
@keyframes rt-fadein{ from{ opacity:0; } }
.retro .encounter-modal .encounter{ width:100%; max-width:440px; max-height:calc(100% - 24px); overflow-y:auto; margin:0; }
.retro .enc-actions{ display:flex; gap:10px; padding:14px; }
.retro .enc-actions .primary{ flex:1 1 auto; }
.retro .enc-actions .ghost{ flex:0 0 auto; }

/* ---- ceremonial forge victory (results screen) --------------------------- */
.retro .victory{ position:relative; overflow:hidden; }
.retro .victory > *{ position:relative; z-index:1; }
.retro .victory-glow{
  position:absolute; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(120% 80% at 50% 28%, rgba(217,180,91,.38), transparent 70%);
  animation:rt-glowpulse 2.4s ease-in-out infinite;
}
@keyframes rt-glowpulse{ 50%{ opacity:.5; } }
.retro .victory-kicker{
  display:block; font-family:var(--pf); font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--gold); opacity:.85; margin-bottom:8px;
}
.retro .victory-sword{
  display:block; width:auto; height:118px; margin:14px auto 6px; image-rendering:pixelated;
  filter:drop-shadow(0 0 6px rgba(217,180,91,.6));
  animation:rt-swordrise .6s cubic-bezier(.2,1.3,.4,1);
}
@keyframes rt-swordrise{ from{ transform:translateY(12px) scale(.9); opacity:0; } }

/* ---- Excalibar fragment inventory (tap the HUD sword) -------------------- */
.retro .adv-sword-mini{ cursor:pointer; }
.retro .forge-modal{
  position:fixed; inset:0; z-index:50; display:flex; align-items:center;
  justify-content:center; padding:20px; background:rgba(0,0,0,.72);
  animation:rt-fadein .2s ease-out;
}
.retro .forge-panel{
  width:100%; max-width:400px; max-height:calc(100% - 24px); overflow-y:auto;
  background:var(--card); clip-path:var(--notch); padding:20px 18px; text-align:center;
  box-shadow:inset 0 0 0 2px var(--gold),inset 0 0 0 4px rgba(0,0,0,.3);
}
.retro .forge-kicker{ display:block; font-family:var(--pf); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); opacity:.8; }
.retro .forge-title{ font-family:var(--pf); color:var(--gold); font-size:20px; letter-spacing:1px; text-transform:uppercase; text-shadow:2px 2px 0 var(--ink); margin:6px 0 0; }
.retro .forge-sword-big{ display:block; width:auto; height:150px; margin:14px auto 6px; image-rendering:pixelated; filter:drop-shadow(0 0 6px rgba(217,180,91,.5)); }
.retro .forge-tally{ display:block; font-family:var(--pf); font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--teal); margin-bottom:14px; }
.retro .frag-list{ list-style:none; margin:0 0 16px; padding:0; text-align:left; display:flex; flex-direction:column; gap:6px; }
.retro .frag-row{
  display:flex; align-items:center; gap:10px; padding:8px 10px; clip-path:var(--notch);
  background:var(--bg); box-shadow:inset 1px 1px 0 var(--hl),inset -1px -1px 0 var(--sh);
  font-family:var(--pf); font-size:10px; letter-spacing:.5px; text-transform:uppercase;
}
.retro .frag-row .frag-mark{ font-size:14px; flex:0 0 auto; }
.retro .frag-row.got .frag-mark{ color:var(--gold); }
.retro .frag-row.locked{ opacity:.5; }
.retro .frag-row.locked .frag-mark{ color:var(--line); }
.retro .frag-name{ flex:1 1 auto; color:var(--text); }
.retro .frag-src{ font-style:normal; font-size:8px; color:var(--text); opacity:.6; text-align:right; }

/* ---- juicier forge: rays, spark burst, sword flash ----------------------- */
.retro .victory-rays{
  position:absolute; left:50%; top:38%; width:340px; height:340px; z-index:0;
  transform:translate(-50%,-50%); pointer-events:none; opacity:.5;
  background:repeating-conic-gradient(from 0deg, rgba(217,180,91,.16) 0 5deg, transparent 5deg 16deg);
  -webkit-mask-image:radial-gradient(circle, #000 0 30%, transparent 62%);
          mask-image:radial-gradient(circle, #000 0 30%, transparent 62%);
  animation:rt-rays 14s linear infinite;
}
@keyframes rt-rays{ to{ transform:translate(-50%,-50%) rotate(360deg); } }
.retro .victory-forge{ position:relative; }
.retro .victory-sword{ animation:rt-swordrise .6s cubic-bezier(.2,1.3,.4,1), rt-forgeflash 1.1s ease-out; }
@keyframes rt-forgeflash{ 0%{ filter:drop-shadow(0 0 2px rgba(217,180,91,.6)) brightness(3); } 30%{ filter:drop-shadow(0 0 14px rgba(255,240,200,.9)) brightness(1.8); } 100%{ filter:drop-shadow(0 0 6px rgba(217,180,91,.6)) brightness(1); } }
.retro .forge-sparks{ position:absolute; inset:0; z-index:2; pointer-events:none; }
.retro .forge-sparks i{
  position:absolute; left:50%; top:46%; width:7px; height:7px; margin:-3.5px 0 0 -3.5px;
  background:var(--gold); box-shadow:0 0 6px var(--gold); clip-path:polygon(50% 0,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0 50%,40% 40%);
  opacity:0; animation:rt-spark .85s ease-out .18s forwards;
}
@keyframes rt-spark{ 0%{ transform:translate(0,0) scale(0); opacity:0; } 15%{ opacity:1; transform:translate(calc(var(--tx)*.3),calc(var(--ty)*.3)) scale(1.3); } 100%{ transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; } }
.retro .forge-sparks i:nth-child(1){ --tx:0px;    --ty:-64px; }
.retro .forge-sparks i:nth-child(2){ --tx:45px;   --ty:-45px; }
.retro .forge-sparks i:nth-child(3){ --tx:64px;   --ty:0px;   }
.retro .forge-sparks i:nth-child(4){ --tx:45px;   --ty:45px;  }
.retro .forge-sparks i:nth-child(5){ --tx:0px;    --ty:64px;  }
.retro .forge-sparks i:nth-child(6){ --tx:-45px;  --ty:45px;  }
.retro .forge-sparks i:nth-child(7){ --tx:-64px;  --ty:0px;   }
.retro .forge-sparks i:nth-child(8){ --tx:-45px;  --ty:-45px; }
.retro .victory-kicker{ animation:rt-blink 1.6s steps(1) 3; }

/* ---- full-screen forge celebration: flash + confetti + card slam --------- */
.retro .fx-flash{
  position:fixed; inset:0; z-index:199; pointer-events:none;
  background:radial-gradient(circle at 50% 34%, rgba(255,245,215,.95), rgba(217,180,91,.45) 42%, transparent 72%);
  animation:rt-bigflash .6s ease-out forwards;
}
@keyframes rt-bigflash{ 0%{ opacity:0; } 10%{ opacity:1; } 100%{ opacity:0; } }
.retro .confetti{ position:fixed; inset:0; z-index:200; pointer-events:none; overflow:hidden; }
.retro .confetti i{
  position:absolute; top:-24px; width:12px; height:18px; opacity:.97;
  box-shadow:0 0 3px rgba(0,0,0,.35);
  animation:rt-confetti var(--dur,4.5s) linear var(--delay,0s) forwards;
}
.retro .confetti i:nth-child(3n){ width:10px; height:10px; border-radius:50%; }
.retro .confetti i:nth-child(4n){ height:14px; }
@keyframes rt-confetti{
  0%{ transform:translate(0,-24px) rotate(0); opacity:1; }
  12%{ opacity:1; }
  100%{ transform:translate(var(--drift,0), 114vh) rotate(900deg); opacity:.9; }
}
.retro .victory{ animation:rt-slam .55s cubic-bezier(.2,1.4,.35,1); }
@keyframes rt-slam{ 0%{ transform:scale(1.5); opacity:0; } 55%{ transform:scale(.97); opacity:1; } 78%{ transform:scale(1.02); } 100%{ transform:scale(1); } }

</style>

<script>
  window.onerror = function (msg, srcUrl, line, col, err) {
    var b = document.getElementById("errbox");
    b.style.display = "block";
    b.textContent = "Something went wrong:\n" + msg + "\n" + (srcUrl || "") + ":" + line + ":" + col +
      (err && err.stack ? "\n\n" + err.stack : "");
  };
  window.addEventListener("unhandledrejection", function (ev) {
    var b = document.getElementById("errbox");
    b.style.display = "block";
    b.textContent = "Something went wrong (async):\n" + (ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason));
  });
  window.addEventListener("load", function () {
    if (!window.React || !window.ReactDOM || !window.Tone) {
      var b = document.getElementById("errbox");
      b.style.display = "block";
      b.textContent = "Couldn't load the app libraries. Check your internet connection and refresh.";
    }
  });
</script>

  const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&display=swap');

:root {
  --bg: #383D3B;
  --card: #424845;
  --line: #565D59;
  --text: #EDF2EE;
  --text-soft: #A9B3AC;
  --green: #6ABF5E;
  --blue: #7CADD1;
  --teal: #57C6C4;
  --wrong: #E07856;
  --alt: #2B302D;
}
:root[data-theme="light"] {
  --bg: #F1F5F1;
  --card: #FFFFFF;
  --line: #D2DBD4;
  --text: #23302A;
  --text-soft: #63706A;
  --green: #4EA943;
  --blue: #4E86AE;
  --teal: #2FA6A4;
  --wrong: #D0603F;
  --alt: #E4EAE5;
}
html, body { background: var(--bg); }
* { box-sizing: border-box; }
.app {
  min-height: 100vh; background: var(--bg); color: var(--text);
  font-family: 'Archivo', system-ui, sans-serif;
  max-width: 560px; margin: 0 auto;
  /* pad for the iOS status bar / notch when launched from the home screen */
  padding:
    calc(20px + env(safe-area-inset-top, 0px))
    calc(16px + env(safe-area-inset-right, 0px))
    calc(32px + env(safe-area-inset-bottom, 0px))
    calc(16px + env(safe-area-inset-left, 0px));
  display: flex; flex-direction: column; gap: 16px;
  /* app-like touch: no text selection, callout, or tap flash on hold */
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
}
button { touch-action: manipulation; }
.path-note, .explore-pad, .pk, .num, .cu-note, .chip, .rung { touch-action: none; }
/* installed web app: guarantee a top buffer that clears the iOS status bar,
   even where env(safe-area-inset-top) reports 0 */
:root[data-standalone] .app {
  padding-top: max(64px, calc(20px + env(safe-area-inset-top, 0px)));
}
.top { display: flex; flex-direction: column; gap: 12px; }
.top-slim { display: flex; align-items: center; gap: 12px; }
.screen-title {
  font-family: 'Archivo Black', sans-serif; font-weight: 400; font-size: 1.15rem;
  margin: 0; flex: 1;
}
.session-score { color: var(--green); font-weight: 700; font-size: 0.95rem; }
.back {
  background: transparent; border: 1.5px solid var(--line); color: var(--text-soft);
  border-radius: 10px; padding: 7px 12px; font-size: 0.85rem;
}
.brand h1 {
  font-family: 'Archivo Black', 'Archivo', sans-serif; font-weight: 400;
  font-size: 2.1rem; margin: 0; letter-spacing: 0.01em; line-height: 1;
}
.brand .w1 { color: var(--green); }
.brand .w2 { color: var(--blue); }
.brand-line { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.wejam-logo { display: block; height: 46px; width: auto; }
.brand p { margin: 6px 0 0; color: var(--text-soft); font-size: 0.95rem; }
.key-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.fp-coda { height: 46px; width: auto; image-rendering: pixelated; align-self: center; opacity: 0.92; }
.key-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-soft); }
select {
  font-family: inherit; font-size: 0.95rem; color: var(--text);
  background: var(--card); border: 1.5px solid var(--line); border-radius: 10px;
  padding: 8px 10px;
}
button { font-family: inherit; cursor: pointer; transition: transform 0.06s, background 0.15s, border-color 0.15s, color 0.15s; }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.4; cursor: default; }
button:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }
.ghost {
  background: transparent; color: var(--text); border: 1.5px solid var(--line);
  border-radius: 10px; padding: 8px 14px; font-size: 0.9rem; font-weight: 500;
}
.ghost.voice.on { border-color: var(--teal); color: var(--teal); }
.primary {
  background: var(--green); color: #23302A; border: none;
  border-radius: 10px; padding: 10px 18px; font-size: 0.95rem; font-weight: 700;
}
.primary.wide { width: 100%; margin-top: 14px; padding: 13px; }

/* home cards */
.cards { display: flex; flex-direction: column; gap: 12px; }
.card {
  text-align: left; background: var(--card); border: 1.5px solid var(--line);
  border-radius: 16px; padding: 18px 16px; display: flex; flex-direction: column; gap: 5px;
  color: var(--text);
}
.card:hover { border-color: var(--blue); }
.card-title { font-family: 'Archivo Black', sans-serif; font-size: 1.15rem; }
.card-desc { color: var(--text-soft); font-size: 0.9rem; line-height: 1.45; }
.card-progress { color: var(--green); font-size: 0.8rem; font-weight: 600; margin-top: 3px; }
.card.quiet .card-title { color: var(--teal); }

/* level list */
.levels { display: flex; flex-direction: column; gap: 10px; }
.stage-intro {
  background: var(--card); border: 1.5px solid var(--line); border-left: 3px solid var(--teal);
  border-radius: 12px; padding: 12px 14px; margin: 0 0 14px;
}
.stage-goal { margin: 0; font-size: 0.92rem; line-height: 1.5; color: var(--text); }
.stage-meta { display: block; margin-top: 7px; font-size: 0.72rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.06em; }
.level {
  display: flex; align-items: center; gap: 14px; text-align: left;
  background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
  padding: 14px 16px; color: var(--text);
}
.level:hover:not(:disabled) { border-color: var(--green); }
.level.locked { opacity: 0.45; }
.level-num {
  font-family: 'Archivo Black', sans-serif; font-size: 1.3rem; color: var(--blue);
  min-width: 1.4em; text-align: center;
}
.level-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.level-name { font-weight: 700; }
.level-desc { color: var(--text-soft); font-size: 0.85rem; }
.level-state { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 3em; }
.level-pct { font-family: 'Archivo Black', sans-serif; font-size: 0.95rem; color: var(--text-soft); }
.level-pct.pass { color: var(--green); }
.level-check { color: var(--green); font-size: 0.95rem; line-height: 1; }

/* session */
.progressbar {
  height: 8px; background: var(--card); border-radius: 99px; overflow: hidden;
  border: 1px solid var(--line);
}
.progressbar .fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
.qcount { margin: -6px 0 0; font-size: 0.8rem; color: var(--text-soft); text-align: center; }

/* ── the signature: proportional tonal map ── */
.ladder {
  display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px;
  background: var(--card); border: 1.5px solid var(--line);
  border-radius: 16px; padding: 14px 8px;
  align-items: center;
}
.rung {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; border-radius: 10px; position: relative;
  transition: background 0.25s, box-shadow 0.25s, opacity 0.25s;
}
.rung-num {
  font-family: 'Archivo Black', sans-serif; font-weight: 400;
  font-size: 1.1rem; line-height: 1; color: var(--text);
}
.gap-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-soft); opacity: 0.5;
  justify-self: center; align-self: center;
}
.rung.dim { opacity: 0.22; }
.ladder.explore { padding: 16px 10px; }
.explore-pad {
  border: 1.5px solid var(--line); background: var(--bg);
  min-height: 74px; justify-content: center; cursor: pointer;
}
.explore-pad .rung-num { font-size: 1.5rem; }
.explore-pad.tonic { border-color: var(--teal); }
.explore-pad.blank .rung-num { visibility: hidden; }
.explore-pad.chordal { border-color: var(--blue); }
.explore-pad.chordal .rung-num { color: var(--blue); }
.explore-pad.world-root { border-width: 2.5px; }
.explore-pad.tonic { box-shadow: inset 0 0 0 0; }
.explore-pad.active { background: var(--green); border-color: var(--green); }
.explore-pad.active .rung-num { color: #23302A; }
.explore-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* piano view */
.piano {
  position: relative; height: 190px;
  background: #232725; border: 1.5px solid var(--line); border-radius: 12px;
  overflow: hidden;
}
.pk { position: absolute; top: 0; padding: 0; display: flex; align-items: flex-end; justify-content: center; }
.pk.white {
  height: 100%; background: #EDF2EE; border: 1px solid #232725;
  border-radius: 0 0 6px 6px; z-index: 1;
}
.pk.black {
  height: 60%; background: #1A1D1B; border: 1px solid #000;
  border-radius: 0 0 5px 5px; z-index: 2;
}
.pk.white.active { background: var(--green); }
.pk.black.active { background: var(--green); }
.pk-label {
  font-family: 'Archivo Black', sans-serif; font-size: 1.05rem; color: #23302A;
  margin-bottom: 10px; position: relative;
}
.pk.black .pk-label { color: var(--text); font-size: 0.9rem; margin-bottom: 8px; }
.pk-label.chordal { color: #2F5E86; }
.pk.black .pk-label.chordal { color: var(--blue); }
.pk-label.tonic { color: #0F7B79; }
.pk.black .pk-label.tonic { color: var(--teal); }
.pk-label.world-root { text-decoration: underline; text-underline-offset: 3px; }
.pk-star { position: absolute; top: -0.7em; right: -0.8em; font-size: 0.55em; }
.rung.tonic { box-shadow: inset 0 0 0 1.5px var(--teal); }
.rung.tonic .rung-num { color: var(--teal); }
.rung.tonic::before {
  content: "✳"; position: absolute; top: 1px; right: 2px;
  font-size: 0.5rem; color: var(--teal); line-height: 1;
}
.rung.active, .rung.correct {
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(106,191,94,0.25), 0 0 18px rgba(106,191,94,0.45);
}
.rung.active .rung-num, .rung.correct .rung-num { color: #23302A; }
.rung.active::before, .rung.correct::before { color: #23302A; }
.rung.selected { background: var(--blue); }
.rung.selected .rung-num { color: #232E36; }
.rung.wrong { background: var(--wrong); }
.rung.wrong .rung-num { color: #3A241B; }
@media (prefers-reduced-motion: no-preference) {
  .rung.correct { animation: pulse 0.5s ease-out; }
  @keyframes pulse { 0% { transform: scale(1); } 40% { transform: scale(1.12); } 100% { transform: scale(1); } }
}

.panel {
  background: var(--card); border: 1.5px solid var(--line);
  border-radius: 16px; padding: 18px 16px;
}
.hint { margin: 0 0 14px; font-size: 0.92rem; color: var(--text-soft); line-height: 1.5; }
.hint.center { text-align: center; margin: 0; }
.hint.grow { flex: 1; margin: 0; min-height: 2.7em; }
.hint em { color: var(--text); font-style: normal; font-weight: 600; }
.hint strong { color: var(--teal); font-family: 'Archivo Black', sans-serif; font-weight: 400; font-size: 1.05rem; }
.quiz-bar { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.replay-group { display: flex; flex-shrink: 0; }
.replay-group .ghost { border-radius: 10px 0 0 10px; border-right-width: 0.75px; }
.replay-group .ghost.note { border-radius: 0 10px 10px 0; border-left-width: 0.75px; padding-left: 12px; padding-right: 12px; font-size: 1.05rem; }

.numpad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.num {
  aspect-ratio: 1; min-height: 58px;
  font-family: 'Archivo Black', sans-serif; font-weight: 400; font-size: 1.5rem;
  background: var(--bg); color: var(--text);
  border: 1.5px solid var(--line); border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
}
.num-sol {
  font-family: 'Archivo', sans-serif; font-weight: 500; font-size: 0.62rem;
  color: var(--text-soft); letter-spacing: 0.05em;
}
.rung-sol {
  font-family: 'Archivo', sans-serif; font-weight: 500; font-size: 0.6rem;
  color: var(--text-soft); letter-spacing: 0.05em; margin-top: 2px;
}
.rung.active .rung-sol, .explore-pad.active .rung-sol { color: #23302A; }
.num.tonic { border-color: var(--teal); color: var(--teal); }
.num.picked { background: var(--blue); color: #232E36; border-color: var(--blue); }
.num.dim { opacity: 0.22; }
.num.picked.tonic { background: var(--teal); color: #1E3230; border-color: var(--teal); }

/* chromatic answer pad: 12 notes in two rows, altered ones tinted darker */
.numpad.chromatic { grid-template-columns: repeat(6, 1fr); gap: 8px; }
.num.chrom { aspect-ratio: auto; min-height: 52px; font-size: 1.2rem; padding: 10px 0; }
.num.chrom.alt { background: var(--alt); color: var(--text-soft); }
.num.chrom.tonic { border-color: var(--teal); color: var(--teal); }
.num.chrom.tonic.alt { color: var(--teal); }

/* altered positions on the tonal map when chromatics are shown */
.alt-rung { padding: 7px 0; }
.rung-num.alt { font-size: 0.72rem; color: var(--text-soft); }
.rung.active .rung-num.alt, .rung.correct .rung-num.alt, .rung.wrong .rung-num.alt { color: #23302A; }

/* FET-style pill tags on melody level cards */
.level-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
.tag {
  font-size: 0.72rem; color: var(--text-soft);
  background: var(--bg); border: 1px solid var(--line); border-radius: 999px;
  padding: 2px 9px; white-space: nowrap;
}

/* per-level progress squares */
.squares { display: flex; gap: 3px; margin-top: 7px; }
.sq { width: 9px; height: 9px; border-radius: 2px; background: var(--line); }
.sq.on { background: var(--green); }

/* Stages / Custom tabs */
.tabs { display: flex; gap: 6px; background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 4px; }
.tab {
  flex: 1; background: transparent; border: none; color: var(--text-soft);
  border-radius: 9px; padding: 9px; font-size: 0.9rem; font-weight: 600;
}
.tab.on { background: var(--bg); color: var(--text); box-shadow: inset 0 0 0 1.5px var(--line); }

/* custom level builder */
.custom-builder { display: flex; flex-direction: column; gap: 14px; }
.cu-row { display: flex; align-items: center; gap: 12px; }
.cu-label { font-size: 0.85rem; color: var(--text-soft); min-width: 4.6em; }
.seg { display: flex; flex: 1; gap: 6px; }
.seg button {
  flex: 1; background: var(--card); color: var(--text-soft);
  border: 1.5px solid var(--line); border-radius: 10px; padding: 9px 6px; font-size: 0.85rem; font-weight: 600;
}
.seg button.on { border-color: var(--blue); color: var(--text); }
.cu-notes-head { display: flex; align-items: center; justify-content: space-between; }
.cu-presets { display: flex; gap: 6px; }
.cu-presets button {
  background: transparent; color: var(--text-soft); border: 1.5px solid var(--line);
  border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 600;
}
.cu-notes { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.cu-note {
  min-height: 48px; font-family: 'Archivo Black', sans-serif; font-size: 1.1rem;
  background: var(--bg); color: var(--text-soft);
  border: 1.5px solid var(--line); border-radius: 12px;
}
.cu-note.alt { background: var(--alt); }
.cu-note.on { background: var(--blue); color: #232E36; border-color: var(--blue); }
.cu-note.tonic { border-color: var(--teal); }
.cu-note.on.tonic { background: var(--teal); color: #1E3230; }

/* settings */
.brand-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.gear {
  background: transparent; border: 1.5px solid var(--line); color: var(--text-soft);
  border-radius: 10px; width: 40px; height: 40px; font-size: 1.2rem; flex-shrink: 0;
}
.gear:hover { border-color: var(--teal); color: var(--teal); }

/* adventure map (Harmonia) */
.card.adventure { border-color: var(--teal); }
.card.adventure .card-title { color: var(--teal); }
.card.adventure:hover { border-color: var(--green); }
/* full-screen immersive adventure: the map fills the screen, HUD floats on top */
/* flex column: solid HUD bars top & bottom, the map lives fully BETWEEN them
   (never scrolls under a bar), so nothing obscures the terrain or Coda. */
.adv-screen { position: fixed; inset: 0; z-index: 40; background: #1b1f1d; overflow: hidden; display: flex; flex-direction: column; }
.adv-scroll { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; display: flex; justify-content: center; }
.adv-map { image-rendering: pixelated; width: 100%; max-width: 460px; height: auto; align-self: center; margin: auto 0; cursor: pointer; }
.adv-hud { flex: 0 0 auto; z-index: 2; display: flex; align-items: center; gap: 12px; }
.adv-hud-top {
  padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
  background: #161a18; border-bottom: 2px solid #2b322d;
}
.adv-hud-bottom {
  padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
  background: #161a18; border-top: 2px solid #2b322d;
}
.adv-logo { height: 26px; width: auto; image-rendering: pixelated; }
.adv-title { flex: 1; font-family: 'Archivo Black', sans-serif; font-size: 1.05rem; letter-spacing: 0.08em; color: var(--teal); text-transform: uppercase; }
.adv-sword-mini { image-rendering: pixelated; height: 64px; width: auto; flex-shrink: 0; }
.adv-forge-txt { flex: 1; display: flex; flex-direction: column; gap: 2px; font-size: 0.82rem; color: var(--text-soft); }
.adv-forge-txt b { font-family: 'Archivo Black', sans-serif; font-size: 1rem; color: var(--teal); }
.adv-hud-actions { display: flex; gap: 8px; }
.adv-hud-actions .ghost { padding: 8px 11px; font-size: 1.1rem; }
.settings { display: flex; flex-direction: column; gap: 20px; }
.set-block {
  display: flex; flex-direction: column; gap: 10px;
  background: var(--card); border: 1.5px solid var(--line); border-radius: 16px; padding: 16px;
}
.set-label { font-family: 'Archivo Black', sans-serif; font-size: 1rem; }
.set-desc { margin: -4px 0 2px; font-size: 0.85rem; color: var(--text-soft); }
.set-block .seg button.on { border-color: var(--teal); color: var(--teal); }

/* chord-tones reference chart */
.chord-ref {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
}
.cr-row {
  display: flex; align-items: baseline; gap: 8px;
  background: var(--bg); border: 1.5px solid var(--line); border-radius: 10px;
  padding: 7px 11px; flex: 1 1 auto; min-width: 128px;
}
.cr-sym { font-family: 'Archivo Black', sans-serif; font-size: 0.95rem; min-width: 2.6em; }
.cr-num { color: var(--blue); font-weight: 700; font-size: 0.82rem; min-width: 2.6em; }
.cr-tones { margin-left: auto; color: var(--text-soft); font-weight: 600; font-size: 0.9rem; }
.cr-tones b { color: var(--teal); font-weight: 700; }

/* chord progressions */
.streak { color: var(--wrong); font-weight: 700; margin-right: 8px; }
/* input area holds either the buttons or the review stacks — fixed height so
   swapping between them never shifts the layout, and the stacks never clip */
/* the answer slots ARE the stacks — always in place; the degree ladder is a
   skeleton with a "?" until you tap a chord, then its tones circle in. */
.prog-layout { display: flex; flex-direction: column; gap: 16px; }
.prog-stacks { display: flex; gap: 12px; align-items: flex-start; justify-content: center; flex-wrap: nowrap; }
.prog-stack { gap: 2px; flex: 0 0 auto; transition: transform 0.15s ease; }
.prog-stack .stack-note {
  width: 24px; height: 18px; font-size: 0.72rem; border-radius: 5px;
  transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, opacity 0.2s;
}
.prog-stack:not(.filled) .stack-note { opacity: 0.35; }
.prog-stack:not(.filled) .stack-label { color: var(--text-soft); }
.prog-stack .stack-note.on { border-width: 1.5px; }
.prog-stack .stack-note.home { color: var(--teal); }
.prog-stack .stack-note.on.home { border-color: var(--teal); color: var(--teal); }
.prog-stack .stack-label { color: var(--blue); font-size: 0.85rem; padding-top: 4px; min-width: 30px; }
.prog-stack.wrong .stack-label { color: var(--wrong); }
.prog-stack.wrong .stack-note.on { border-color: var(--wrong); color: var(--wrong); }
.prog-stack.active { transform: translateY(-3px) scale(1.06); }
.prog-stack.active .stack-note.on { border-color: var(--green); color: var(--green); box-shadow: 0 0 8px rgba(106,191,94,0.5); }
.prog-stack.active .stack-label { color: var(--green); }
.numpad.chordpad { grid-template-columns: repeat(4, 1fr); }
.num.chordbtn { aspect-ratio: auto; min-height: 52px; font-size: 1.15rem; }

/* Melody Paths grid */
.path-presets { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  background: var(--card); color: var(--text-soft); border: 1.5px solid var(--line);
  border-radius: 999px; padding: 7px 13px; font-family: 'Archivo Black', sans-serif; font-size: 0.85rem;
}
.chip.on { border-color: var(--teal); color: var(--text); }
.path-count {
  font-family: 'Archivo Black', sans-serif; font-size: 1.4rem; color: var(--teal);
  min-width: 1.4em; text-align: center;
}
.path-build { display: flex; flex-direction: column; gap: 12px; }
.path-grid {
  display: flex; gap: 10px; justify-content: center; overflow-x: auto;
  background: var(--card); border: 1.5px solid var(--line); border-radius: 16px; padding: 14px 10px;
}
.path-col {
  display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 0 0 auto;
  padding: 6px 6px 4px; border-radius: 12px; border: 2px solid transparent; transition: background 0.2s, border-color 0.2s;
}
.path-col.current { border-color: var(--teal); background: rgba(87,198,196,0.08); }
.path-note {
  width: 40px; height: 34px; border-radius: 8px;
  background: var(--bg); color: var(--text-soft); border: 1.5px solid transparent;
  font-family: 'Archivo Black', sans-serif; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s, box-shadow 0.12s;
}
.path-note.on { border: 1.5px solid var(--blue); color: var(--blue); }
.path-note.home { color: var(--teal); }
.path-note.on.home { border-color: var(--teal); color: var(--teal); }
.path-note.lit { background: var(--green); color: #23302A; border-color: var(--green); box-shadow: 0 0 14px rgba(106,191,94,0.5); }
.path-label {
  font-family: 'Archivo Black', sans-serif; font-size: 0.95rem; color: var(--text);
  border-top: 2px solid var(--line); padding-top: 6px; margin-top: 2px; min-width: 40px; text-align: center;
}
.path-col.current .path-label { color: var(--teal); }
.hint .numlabel { color: var(--blue); font-style: normal; font-weight: 600; font-family: 'Archivo', sans-serif; }
.prog-actions { display: flex; gap: 10px; align-items: center; }
.primary.grow { flex: 1; }

/* results stats */
.stat-row { display: flex; gap: 10px; width: 100%; }
.stat {
  flex: 1; text-align: center; font-size: 0.85rem; color: var(--text-soft);
  background: var(--card); border: 1.5px solid var(--line); border-radius: 12px; padding: 10px;
}
.stat b { display: block; font-family: 'Archivo Black', sans-serif; font-size: 1.4rem; color: var(--text); font-weight: 400; }

/* results */
.results { display: flex; flex-direction: column; gap: 16px; align-items: center; padding-top: 8px; }
.score-big {
  font-family: 'Archivo Black', sans-serif; font-size: 4rem; line-height: 1;
  color: var(--wrong);
}
.score-big.pass { color: var(--green); }
.bars { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label {
  font-family: 'Archivo Black', sans-serif; min-width: 2.2em; text-align: right;
  color: var(--blue);
}
.bar-track { flex: 1; height: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--green); border-radius: 99px; }
.bar-count { min-width: 2.6em; font-size: 0.8rem; color: var(--text-soft); }
.results-actions { display: flex; gap: 10px; }

.foot { text-align: center; font-size: 0.8rem; color: var(--text-soft); line-height: 1.5; padding: 0 12px; margin-top: auto; }

/* guide */
.card.start { border-color: var(--teal); }
.card.start .card-title { color: var(--teal); }
.guide-page { display: flex; flex-direction: column; gap: 14px; }
.guide-page h3 {
  font-family: 'Archivo Black', sans-serif; font-weight: 400; font-size: 1.25rem;
  margin: 0; color: var(--green);
}
.guide-page p { margin: 0; font-size: 0.95rem; line-height: 1.6; color: var(--text); }
.guide-page p em { color: var(--blue); font-style: normal; font-weight: 600; }
.guide-page .guide-lead { color: var(--blue); font-weight: 700; margin-top: 6px; }
.guide-numbers {
  font-family: 'Archivo Black', sans-serif; font-size: 1.25rem; text-align: center;
  color: var(--teal); letter-spacing: 0.06em;
}
.guide-page .primary { align-self: flex-start; }
.stacks { display: flex; gap: 26px; justify-content: center; padding: 6px 0; }
.stack { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.stack-note {
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  font-family: 'Archivo Black', sans-serif; font-size: 0.95rem; color: var(--text-soft);
  border-radius: 50%;
}
.stack-note.on { border: 2px solid var(--blue); color: var(--blue); }
.stack-label {
  font-family: 'Archivo Black', sans-serif; font-size: 1.05rem; color: var(--text);
  border-top: 2px solid var(--line); padding-top: 6px; margin-top: 2px; min-width: 34px; text-align: center;
}
.chord-layout { display: flex; gap: 16px; align-items: flex-start; }
.chord-right { flex: 1; display: flex; flex-direction: column; }
.session-stack .stack-note { width: 32px; height: 32px; font-size: 0.98rem; }
.session-stack { gap: 3px; }
.session-stack .stack-note.picked { border: 2px solid var(--blue); color: var(--blue); }
.session-stack .stack-note.on-wrong { border: 2px solid var(--wrong); color: var(--wrong); }
.session-stack .stack-note.on-correct { border: 2px solid var(--green); color: var(--green); background: rgba(106,191,94,0.12); }
.session-stack .stack-label { color: var(--teal); }
.pager { display: flex; align-items: center; gap: 12px; }
.dots { flex: 1; display: flex; gap: 7px; justify-content: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
.dot.on { background: var(--green); }
`;
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(NumberEarTrainer));
})();
